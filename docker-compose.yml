version: "3.8"

services:
  bot:
    build: ./app
    restart: always
    env_file: .env
    volumes:
      - stats_data:/data

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - stats_data:/usr/share/nginx/html/data:ro

volumes:
  stats_data:
